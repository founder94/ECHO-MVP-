            "text": "HX Design은 사용자 경험(UX)을 넘어 인간 경험 전체를 설계하는 접근법으로, 데이터 분석, 감성 인식, 관계 지능을 통합하여 개인의 정체성 회복과 관계 개선을 목표로 합니다."
          }
        },
        {
          "@type": "Question",
          "name": "ECHO AI는 어떻게 관계 패턴을 분석하나요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ECHO AI는 사용자가 입력한 관계 이야기를 자연어 처리(NLP) 기술로 분석하여 감정 톤, 언어 패턴, 반복되는 주제를 식별하고, 이를 종합하여 개인의 관계 패턴을 도출합니다. AI는 판단하지 않고 거울처럼 비춰줄 뿐입니다."
          }
        },
        {
          "@type": "Question",
          "name": "ECHO의 White Door란 무엇인가요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "White Door는 ECHO Report의 마지막 단계로, AI 분석을 통해 발견된 자신의 가장 깊은 관계 패턴과 마주하는 순간입니다. 사용자가 직접 '문을 여는' 인터랙션을 통해 패턴을 수용하고 자기이해의 새로운 단계로 나아가는 경험을 제공합니다."
          }
        },

          "@type": "Question",
          "name": "제 데이터는 안전하게 보호되나요?",

            "text": "네, ECHO는 모든 사용자 데이터를 암호화하여 저장하며, 분석 과정에서 개인 식별 정보를 분리하여 처리합니다. 데이터는 오직 사용자의 자기 이해를 위해서만 사용되며 제3자에게 판매되거나 공유되지 않습니다. 언제든지 계정 설정에서 모든 데이터를 영구적으로 삭제할 수 있습니다."
